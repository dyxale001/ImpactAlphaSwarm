<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><link rel="stylesheet" href="_base.css">
<style>
  body { background: #F8F8F8; }
  .stack { display: flex; flex-direction: column; gap: 10px; width: 100%; }
  .row { background: #fff; border-radius: 18px; padding: 16px 22px; display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; box-shadow: 0 1px 2px rgba(17,35,32,0.03); }
  .q { font-size: 14px; font-weight: 500; color: #1B3530; line-height: 1.4; }
  .a { font-size: 12px; color: #6F827C; line-height: 1.6; margin-top: 8px; max-width: 540px; }
  .helpful { font-size: 11px; color: #9AAAA4; margin-top: 10px; display: flex; gap: 8px; align-items: center; }
  .sign { width: 24px; height: 24px; border-radius: 999px; display: flex; align-items: center; justify-content: center; color: #1B3530; font-size: 18px; line-height: 1; flex-shrink: 0; font-weight: 300; }
</style></head>
<body><div class="card" style="flex-direction: column; padding: 22px 28px; background: #F8F8F8;">
  <div class="stack">
    <div class="row">
      <div>
        <div class="q">What is Expensify?</div>
        <div class="a">Expensify simplifies expense tracking and reporting with receipt scanning and accounting software integration.</div>
        <div class="helpful">Was this helpful 👍 👎</div>
      </div>
      <div class="sign">−</div>
    </div>
    <div class="row">
      <div class="q">How quickly Can I Get Setup?</div>
      <div class="sign">+</div>
    </div>
    <div class="row">
      <div class="q">Can I use Expensify if my company doesn't use it?</div>
      <div class="sign">+</div>
    </div>
  </div>
</div></body></html>
