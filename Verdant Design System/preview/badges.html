<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><link rel="stylesheet" href="_base.css">
<style>
  .row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; padding: 6px 0; }
  .lab { font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: #6F827C; font-weight: 500; min-width: 88px; }
  .pill { font-family: 'Manrope', sans-serif; border-radius: 999px; padding: 6px 14px; font-size: 12px; font-weight: 500; display: inline-flex; align-items: center; gap: 6px; }
  .accent { background: #C7F269; color: #1B3530; }
  .accent-soft { background: #EDFACC; color: #1B3530; }
  .dark { background: #1B3530; color: #fff; }
  .neutral { background: #F8F8F8; color: #1B3530; border: 1px solid #EFEFEF; }
  .dot { width: 6px; height: 6px; border-radius: 999px; background: #4FB970; }
</style></head>
<body><div class="card" style="flex-direction: column; padding: 22px 28px; gap: 4px;">
  <div class="row">
    <div class="lab">Accent</div>
    <span class="pill accent">EXPENSIFY</span>
    <span class="pill accent">Problem</span>
    <span class="pill accent" style="font-weight:600;">NEW</span>
  </div>
  <div class="row">
    <div class="lab">Inverse</div>
    <span class="pill dark">Solution</span>
    <span class="pill dark">Sign In</span>
    <span class="pill dark">See More Testimonial</span>
  </div>
  <div class="row">
    <div class="lab">Soft</div>
    <span class="pill accent-soft">CEO</span>
    <span class="pill accent-soft">Beta</span>
  </div>
  <div class="row">
    <div class="lab">Neutral</div>
    <span class="pill neutral"><span class="dot"></span>Mobile App</span>
    <span class="pill neutral">Dashboard</span>
    <span class="pill neutral">Home</span>
    <span class="pill neutral">Features</span>
  </div>
</div></body></html>
