<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><link rel="stylesheet" href="_base.css">
<style>
  .row { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; padding: 8px 0; }
  .btn { font-family: 'Manrope', sans-serif; font-weight: 500; border-radius: 999px; padding: 12px 26px; font-size: 14px; cursor: pointer; border: 1px solid transparent; transition: all 200ms cubic-bezier(0.2,0.6,0.2,1); display: inline-flex; align-items: center; gap: 8px; }
  .btn-primary { background: #1B3530; color: #fff; }
  .btn-primary:hover { background: #28473F; }
  .btn-accent { background: #C7F269; color: #1B3530; }
  .btn-accent:hover { background: #D4F58A; }
  .btn-ghost { background: transparent; color: #1B3530; border-color: rgba(17,35,32,0.14); }
  .btn-ghost:hover { background: rgba(17,35,32,0.04); }
  .btn-link { background: transparent; color: #1B3530; padding: 6px 0; border-radius: 0; text-decoration: underline; text-underline-offset: 4px; }
  .btn-sm { padding: 8px 18px; font-size: 12px; }
  .btn-lg { padding: 16px 32px; font-size: 16px; }
  .lab { font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: #6F827C; font-weight: 500; min-width: 64px; }
</style></head>
<body><div class="card" style="flex-direction: column; padding: 22px 28px; gap: 6px;">
  <div class="row"><div class="lab">Primary</div><button class="btn btn-primary btn-sm">Sign In</button><button class="btn btn-primary">Try it free</button><button class="btn btn-primary btn-lg">Get Started</button></div>
  <div class="row"><div class="lab">Accent</div><button class="btn btn-accent btn-sm">Start</button><button class="btn btn-accent">Strat Using Virtual Card</button><button class="btn btn-accent btn-lg">Download App</button></div>
  <div class="row"><div class="lab">Ghost</div><button class="btn btn-ghost btn-sm">Contact Us</button><button class="btn btn-ghost">Home</button><button class="btn btn-ghost">Pricing</button></div>
  <div class="row"><div class="lab">Link</div><button class="btn btn-link">DOWNLOAD APP ↗</button><button class="btn btn-link">See All Features</button></div>
</div></body></html>
