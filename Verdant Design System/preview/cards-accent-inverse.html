<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><link rel="stylesheet" href="_base.css">
<style>
  body { background: #F8F8F8; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; width: 100%; }
  .c { border-radius: 24px; padding: 22px; min-height: 180px; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; gap: 10px; position: relative; overflow: hidden; }
  .accent { background: linear-gradient(180deg, #C7F269 0%, #EDFACC 100%); color: #1B3530; }
  .inverse { background: #112320; color: #fff; border: 1.5px solid #C7F269; }
  .token { width: 44px; height: 44px; border-radius: 999px; background: #C7F269; display: flex; align-items: center; justify-content: center; color: #1B3530; font-weight: 600; font-size: 18px; }
  .token-lime-on-dark { background: #C7F269; }
  .title { font-size: 17px; font-weight: 600; line-height: 1.2; }
  .body { font-size: 12px; line-height: 1.55; opacity: 0.8; max-width: 240px; }
  .cta { background: #C7F269; color: #1B3530; border-radius: 999px; padding: 10px 22px; font-weight: 500; font-size: 13px; }
</style></head>
<body><div class="card" style="flex-direction: column; padding: 22px 28px; background: #F8F8F8;">
  <div class="grid">
    <div class="c accent">
      <div class="token" style="background:#1B3530;color:#C7F269;">⚡</div>
      <div class="title">Instant Card Access</div>
      <div class="body">Make purchases without a physical card — sending virtual cards instantly.</div>
    </div>
    <div class="c inverse">
      <div class="token token-lime-on-dark">⚡</div>
      <div class="title">Instant Virtual Card Access</div>
      <div class="body">Make purchases without a physical card instantly sending virtual cards.</div>
      <div class="cta">Strat Using Virtual Card</div>
    </div>
  </div>
</div></body></html>
