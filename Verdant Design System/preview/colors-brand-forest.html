<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><link rel="stylesheet" href="_base.css">
<style>
  .row { display: grid; grid-template-columns: repeat(11, 1fr); gap: 8px; width: 100%; }
  .sw { aspect-ratio: 1 / 1.15; border-radius: 12px; padding: 8px 10px; display: flex; flex-direction: column; justify-content: space-between; font-size: 10px; font-weight: 500; }
  .sw .num { opacity: 0.85; letter-spacing: 0.04em; }
  .sw .hex { font-size: 11px; }
  .key { color: var(--fg-muted); font-size: 12px; margin-top: 14px; letter-spacing: 0.04em; text-transform: uppercase; }
  .label-row { display: flex; justify-content: space-between; align-items: baseline; }
  h6 { margin: 0 0 8px 0; color: var(--fg-heading); font-size: 14px; font-weight: 600; letter-spacing: 0.02em; }
</style></head>
<body><div class="card" style="flex-direction: column;">
  <div class="label-row">
    <h6>Forest — primary brand</h6>
    <span style="font-size: 11px; color: var(--fg-muted);">700 → headings · 900 → body</span>
  </div>
  <div class="row">
    <div class="sw" style="background:#F1F5F3;color:#1B3530;"><span class="num">50</span><span class="hex">F1F5F3</span></div>
    <div class="sw" style="background:#E4ECE9;color:#1B3530;"><span class="num">100</span><span class="hex">E4ECE9</span></div>
    <div class="sw" style="background:#C9D8D3;color:#1B3530;"><span class="num">200</span><span class="hex">C9D8D3</span></div>
    <div class="sw" style="background:#9DB6AF;color:#0A1715;"><span class="num">300</span><span class="hex">9DB6AF</span></div>
    <div class="sw" style="background:#6A8B82;color:#fff;"><span class="num">400</span><span class="hex">6A8B82</span></div>
    <div class="sw" style="background:#3E6258;color:#fff;"><span class="num">500</span><span class="hex">3E6258</span></div>
    <div class="sw" style="background:#28473F;color:#fff;"><span class="num">600</span><span class="hex">28473F</span></div>
    <div class="sw" style="background:#1B3530;color:#fff;outline:2px solid #C7F269;outline-offset:-2px;"><span class="num">700★</span><span class="hex">1B3530</span></div>
    <div class="sw" style="background:#173027;color:#fff;"><span class="num">800</span><span class="hex">173027</span></div>
    <div class="sw" style="background:#112320;color:#fff;outline:2px solid #C7F269;outline-offset:-2px;"><span class="num">900★</span><span class="hex">112320</span></div>
    <div class="sw" style="background:#0A1715;color:#fff;"><span class="num">950</span><span class="hex">0A1715</span></div>
  </div>
</div></body></html>
