<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><link rel="stylesheet" href="_base.css">
<style>
  .row { display: grid; grid-template-columns: repeat(8, 1fr); gap: 8px; width: 100%; }
  .sw { aspect-ratio: 1 / 1.15; border-radius: 12px; padding: 8px 10px; display: flex; flex-direction: column; justify-content: space-between; font-size: 10px; font-weight: 500; }
  .sw .num { opacity: 0.85; letter-spacing: 0.04em; }
  .sw .hex { font-size: 11px; }
  h6 { margin: 0 0 8px 0; color: var(--fg-heading); font-size: 14px; font-weight: 600; }
  .label-row { display: flex; justify-content: space-between; align-items: baseline; }
</style></head>
<body><div class="card" style="flex-direction: column;">
  <div class="label-row">
    <h6>Lime — signature accent</h6>
    <span style="font-size: 11px; color: var(--fg-muted);">500 is the brand — pills · CTAs · glow blocks</span>
  </div>
  <div class="row">
    <div class="sw" style="background:#FAFEEE;color:#1B3530;"><span class="num">50</span><span class="hex">FAFEEE</span></div>
    <div class="sw" style="background:#F4FCE0;color:#1B3530;"><span class="num">100</span><span class="hex">F4FCE0</span></div>
    <div class="sw" style="background:#EDFACC;color:#1B3530;"><span class="num">200</span><span class="hex">EDFACC</span></div>
    <div class="sw" style="background:#E1F8AC;color:#1B3530;"><span class="num">300</span><span class="hex">E1F8AC</span></div>
    <div class="sw" style="background:#D4F58A;color:#1B3530;"><span class="num">400</span><span class="hex">D4F58A</span></div>
    <div class="sw" style="background:#C7F269;color:#1B3530;outline:2px solid #1B3530;outline-offset:-2px;"><span class="num">500★</span><span class="hex">C7F269</span></div>
    <div class="sw" style="background:#9FCC4A;color:#1B3530;"><span class="num">600</span><span class="hex">9FCC4A</span></div>
    <div class="sw" style="background:#7FA837;color:#fff;"><span class="num">700</span><span class="hex">7FA837</span></div>
  </div>
</div></body></html>
