<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><link rel="stylesheet" href="_base.css">
<style>
  .row { display: grid; grid-template-columns: repeat(11, 1fr); gap: 8px; width: 100%; }
  .sw { aspect-ratio: 1 / 1.15; border-radius: 12px; padding: 8px 10px; display: flex; flex-direction: column; justify-content: space-between; font-size: 10px; font-weight: 500; }
  .sw .hex { font-size: 11px; }
  h6 { margin: 0 0 8px 0; color: var(--fg-heading); font-size: 14px; font-weight: 600; }
  .label-row { display: flex; justify-content: space-between; align-items: baseline; }
</style></head>
<body><div class="card" style="flex-direction: column;">
  <div class="label-row">
    <h6>Neutrals</h6>
    <span style="font-size: 11px; color: var(--fg-muted);">100 = page bg · 0 = card surface</span>
  </div>
  <div class="row">
    <div class="sw" style="background:#FFFFFF;color:#112320;border:1px solid #EFEFEF;"><span>0★</span><span class="hex">FFFFFF</span></div>
    <div class="sw" style="background:#FBFBFB;color:#112320;border:1px solid #EFEFEF;"><span>50</span><span class="hex">FBFBFB</span></div>
    <div class="sw" style="background:#F8F8F8;color:#112320;border:1px solid #EFEFEF;"><span>100★</span><span class="hex">F8F8F8</span></div>
    <div class="sw" style="background:#EFEFEF;color:#112320;"><span>200</span><span class="hex">EFEFEF</span></div>
    <div class="sw" style="background:#E2E2E2;color:#112320;"><span>300</span><span class="hex">E2E2E2</span></div>
    <div class="sw" style="background:#C9C9C9;color:#112320;"><span>400</span><span class="hex">C9C9C9</span></div>
    <div class="sw" style="background:#9B9B9B;color:#fff;"><span>500</span><span class="hex">9B9B9B</span></div>
    <div class="sw" style="background:#6B6B6B;color:#fff;"><span>600</span><span class="hex">6B6B6B</span></div>
    <div class="sw" style="background:#4A4A4A;color:#fff;"><span>700</span><span class="hex">4A4A4A</span></div>
    <div class="sw" style="background:#2A2A2A;color:#fff;"><span>800</span><span class="hex">2A2A2A</span></div>
    <div class="sw" style="background:#131313;color:#fff;"><span>900</span><span class="hex">131313</span></div>
  </div>
</div></body></html>
