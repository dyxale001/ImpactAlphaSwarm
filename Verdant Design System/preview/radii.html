<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><link rel="stylesheet" href="_base.css">
<style>
  .grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 12px; width: 100%; }
  .tile { background: #112320; height: 78px; display: flex; align-items: flex-end; justify-content: center; padding-bottom: 8px; color: #C7F269; font-size: 10px; font-family: ui-monospace, monospace; }
  .lab { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .name { font-size: 11px; font-weight: 600; color: #1B3530; text-align: center; }
  .px { font-size: 10px; color: #9AAAA4; font-family: ui-monospace, monospace; }
  h6 { margin: 0 0 12px 0; color: #1B3530; font-size: 14px; font-weight: 600; }
</style></head>
<body><div class="card" style="flex-direction: column; padding: 22px 28px;">
  <h6>Corner radii — pills dominate, cards 24-32 px</h6>
  <div class="grid">
    <div class="lab"><div class="tile" style="border-radius:4px;"></div><div class="name">xs</div><div class="px">4 px</div></div>
    <div class="lab"><div class="tile" style="border-radius:8px;"></div><div class="name">sm</div><div class="px">8 px</div></div>
    <div class="lab"><div class="tile" style="border-radius:12px;"></div><div class="name">md</div><div class="px">12 px</div></div>
    <div class="lab"><div class="tile" style="border-radius:16px;"></div><div class="name">lg</div><div class="px">16 px</div></div>
    <div class="lab"><div class="tile" style="border-radius:24px;"></div><div class="name">2xl ★</div><div class="px">24 px</div></div>
    <div class="lab"><div class="tile" style="border-radius:32px;"></div><div class="name">3xl</div><div class="px">32 px</div></div>
    <div class="lab"><div class="tile" style="border-radius:999px;"></div><div class="name">pill ★</div><div class="px">999 px</div></div>
  </div>
</div></body></html>
