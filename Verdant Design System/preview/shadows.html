<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><link rel="stylesheet" href="_base.css">
<style>
  body { background: #F8F8F8; }
  .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 20px; width: 100%; padding: 8px; }
  .tile { background: #fff; height: 86px; border-radius: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; }
  .name { font-size: 12px; font-weight: 600; color: #1B3530; }
  .px { font-size: 10px; color: #9AAAA4; font-family: ui-monospace, monospace; }
  h6 { margin: 0 0 12px 0; color: #1B3530; font-size: 14px; font-weight: 600; padding: 0 8px; }
</style></head>
<body><div class="card" style="flex-direction: column; padding: 22px 24px; background: #F8F8F8;">
  <h6>Elevation — quiet, single-layer drops</h6>
  <div class="grid">
    <div class="tile" style="box-shadow:0 1px 2px rgba(17,35,32,0.04);"><div class="name">xs</div><div class="px">1 / 2</div></div>
    <div class="tile" style="box-shadow:0 2px 6px rgba(17,35,32,0.05);"><div class="name">sm</div><div class="px">2 / 6</div></div>
    <div class="tile" style="box-shadow:0 8px 24px rgba(17,35,32,0.06);"><div class="name">md ★</div><div class="px">8 / 24</div></div>
    <div class="tile" style="box-shadow:0 18px 48px rgba(17,35,32,0.08);"><div class="name">lg</div><div class="px">18 / 48</div></div>
    <div class="tile" style="box-shadow:0 32px 80px rgba(17,35,32,0.10);"><div class="name">xl</div><div class="px">32 / 80</div></div>
  </div>
</div></body></html>
