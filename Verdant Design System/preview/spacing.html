<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><link rel="stylesheet" href="_base.css">
<style>
  .row { display: flex; flex-direction: column; gap: 6px; width: 100%; }
  .step { display: grid; grid-template-columns: 60px 80px 1fr; align-items: center; gap: 16px; padding: 4px 0; }
  .tok { font-size: 11px; font-family: ui-monospace, monospace; color: #1B3530; font-weight: 500; }
  .px  { font-size: 11px; color: #9AAAA4; font-family: ui-monospace, monospace; }
  .bar { height: 18px; background: #C7F269; border-radius: 4px; }
  h6 { margin: 0 0 12px 0; color: #1B3530; font-size: 14px; font-weight: 600; }
</style></head>
<body><div class="card" style="flex-direction: column; padding: 22px 28px;">
  <h6>Spacing — 4 px base unit</h6>
  <div class="row">
    <div class="step"><div class="tok">space-1</div><div class="px">4 px</div><div class="bar" style="width:4px;"></div></div>
    <div class="step"><div class="tok">space-2</div><div class="px">8 px</div><div class="bar" style="width:8px;"></div></div>
    <div class="step"><div class="tok">space-3</div><div class="px">12 px</div><div class="bar" style="width:12px;"></div></div>
    <div class="step"><div class="tok">space-4</div><div class="px">16 px</div><div class="bar" style="width:16px;"></div></div>
    <div class="step"><div class="tok">space-6</div><div class="px">24 px</div><div class="bar" style="width:24px;"></div></div>
    <div class="step"><div class="tok">space-8</div><div class="px">32 px</div><div class="bar" style="width:32px;"></div></div>
    <div class="step"><div class="tok">space-12</div><div class="px">48 px</div><div class="bar" style="width:48px;"></div></div>
    <div class="step"><div class="tok">space-16</div><div class="px">64 px</div><div class="bar" style="width:64px;"></div></div>
    <div class="step"><div class="tok">space-24</div><div class="px">96 px</div><div class="bar" style="width:96px;"></div></div>
    <div class="step"><div class="tok">space-32</div><div class="px">128 px</div><div class="bar" style="width:128px;"></div></div>
  </div>
</div></body></html>
