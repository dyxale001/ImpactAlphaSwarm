<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><link rel="stylesheet" href="_base.css">
<style>
  .eyebrow { font-size: 12px; font-weight: 500; letter-spacing: 0.14em; text-transform: uppercase; color: #6F827C; margin-bottom: 14px; display: inline-flex; align-items: center; gap: 10px; }
  .pill { background: #C7F269; color: #1B3530; padding: 4px 12px; border-radius: 999px; font-size: 11px; font-weight: 600; letter-spacing: 0.06em; }
  h1.display { font-size: 56px; font-weight: 500; letter-spacing: -0.02em; line-height: 1.05; color: #1B3530; margin: 0 0 14px 0; }
  h1.display sup { font-size: 0.28em; vertical-align: super; font-weight: 400; color: #6F827C; }
  .lead { font-size: 16px; line-height: 1.55; color: #6F827C; max-width: 520px; margin: 0; }
</style></head>
<body><div class="card" style="flex-direction: column; padding: 26px 28px;">
  <div class="eyebrow">Welcome To <span class="pill">EXPENSIFY</span></div>
  <h1 class="display">Streamline Your<br>Spending Goals<sup>®</sup></h1>
  <p class="lead">Effortlessly track expenses, capture receipts, and manage spending—all in one app.</p>
</div></body></html>
