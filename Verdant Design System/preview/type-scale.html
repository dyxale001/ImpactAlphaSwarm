<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><link rel="stylesheet" href="_base.css">
<style>
  .row { display: grid; grid-template-columns: 70px 80px 1fr 80px; align-items: baseline; padding: 6px 0; border-bottom: 1px solid #F4F4F4; }
  .row:last-child { border-bottom: 0; }
  .tok { font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; color: #6F827C; font-weight: 500; font-family: ui-monospace, monospace; }
  .px  { font-size: 11px; color: #9AAAA4; font-family: ui-monospace, monospace; }
  .lh  { font-size: 11px; color: #9AAAA4; font-family: ui-monospace, monospace; text-align: right; }
  .sample { color: #1B3530; font-weight: 500; letter-spacing: -0.02em; line-height: 1; }
</style></head>
<body><div class="card" style="flex-direction: column; padding: 16px 28px;">
  <div class="row"><div class="tok">8xl</div><div class="px">112 px</div><div class="sample" style="font-size:46px;">Display Mega</div><div class="lh">1.00</div></div>
  <div class="row"><div class="tok">6xl</div><div class="px">64 px</div><div class="sample" style="font-size:38px;">Hero headline</div><div class="lh">1.05</div></div>
  <div class="row"><div class="tok">4xl</div><div class="px">48 px</div><div class="sample" style="font-size:32px;">Section title</div><div class="lh">1.10</div></div>
  <div class="row"><div class="tok">2xl</div><div class="px">32 px</div><div class="sample" style="font-size:24px;">Subsection</div><div class="lh">1.20</div></div>
  <div class="row"><div class="tok">xl</div><div class="px">24 px</div><div class="sample" style="font-size:20px;">Card title</div><div class="lh">1.30</div></div>
  <div class="row"><div class="tok">lg</div><div class="px">20 px</div><div class="sample" style="font-size:18px;font-weight:400;color:#112320;">Lead copy</div><div class="lh">1.50</div></div>
  <div class="row"><div class="tok">base</div><div class="px">16 px</div><div class="sample" style="font-size:16px;font-weight:400;color:#112320;">Body paragraph</div><div class="lh">1.50</div></div>
  <div class="row"><div class="tok">sm</div><div class="px">14 px</div><div class="sample" style="font-size:14px;font-weight:400;color:#6F827C;">Secondary / meta</div><div class="lh">1.50</div></div>
  <div class="row"><div class="tok">xs</div><div class="px">12 px</div><div class="sample" style="font-size:12px;font-weight:500;color:#6F827C;letter-spacing:0.14em;text-transform:uppercase;">EYEBROW LABEL</div><div class="lh">1.50</div></div>
</div></body></html>
