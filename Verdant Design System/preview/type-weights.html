<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><link rel="stylesheet" href="_base.css">
<style>
  .stack { display: flex; flex-direction: column; gap: 4px; width: 100%; }
  .row { display: grid; grid-template-columns: 110px 1fr 80px; align-items: baseline; padding: 10px 0; border-bottom: 1px solid #EFEFEF; }
  .row:last-child { border-bottom: 0; }
  .lab { font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: #6F827C; font-weight: 500; }
  .sample { font-size: 36px; line-height: 1; letter-spacing: -0.02em; color: #1B3530; }
  .num { font-size: 12px; font-family: ui-monospace, monospace; color: #9AAAA4; text-align: right; }
</style></head>
<body><div class="card" style="flex-direction: column; padding: 18px 28px;">
  <div class="stack">
    <div class="row"><div class="lab">Light</div><div class="sample" style="font-weight:300;">Streamline your spending</div><div class="num">300</div></div>
    <div class="row"><div class="lab">Regular</div><div class="sample" style="font-weight:400;">Streamline your spending</div><div class="num">400</div></div>
    <div class="row"><div class="lab">Medium</div><div class="sample" style="font-weight:500;">Streamline your spending</div><div class="num">500</div></div>
    <div class="row"><div class="lab">Semibold</div><div class="sample" style="font-weight:600;">Streamline your spending</div><div class="num">600</div></div>
  </div>
</div></body></html>
